name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - id: smg-actions
        uses: getsentry/action-github-app-token@v3
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.smg-actions.outputs.token }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          distribution: goreleaser
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update install version in README
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ steps.smg-actions.outputs.token }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          sed -i "s|go install github.com/StirlingMarketingGroup/swoof@.*|go install github.com/StirlingMarketingGroup/swoof@${TAG}|" README.md
          git config user.name "smg-actions[bot]"
          git config user.email "smg-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --staged --quiet; then
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
            git commit -m "Update install version to ${TAG}"
            git push origin HEAD:master
          fi
